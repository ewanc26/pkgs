<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#1f3328" />
    </pattern>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="14" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <radialGradient id="glowGrad" cx="28%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#3fb968" stop-opacity="0.13" />
      <stop offset="100%" stop-color="#090f0c" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#090f0c" />
  <rect width="1200" height="630" fill="url(#dots)" />
  <rect width="1200" height="630" fill="url(#glowGrad)" />

  <!-- Left accent bar -->
  <rect x="72" y="160" width="3" height="310" rx="2" fill="#3fb968" opacity="0.7" />

  <!-- Eyebrow -->
  <text x="96" y="192" font-family="JetBrains Mono" font-size="18" fill="#6b9e7e" letter-spacing="3">MALACHITE / ABOUT</text>

  <!-- Headline -->
  <text x="96" y="280" font-family="Inter" font-size="76" font-weight="700" fill="#d8ede1" letter-spacing="-2">About &amp; privacy.</text>

  <!-- Subline -->
  <text x="96" y="334" font-family="Inter" font-size="26" fill="#6b9e7e">How Malachite works, what it does</text>
  <text x="96" y="366" font-family="Inter" font-size="26" fill="#6b9e7e">with your data, and how to run it locally.</text>

  <!-- Pill row: privacy promises -->
  <g transform="translate(96, 418)">
    <rect x="0" y="0" width="170" height="40" rx="20" fill="#0e1a13" stroke="#1f3328" stroke-width="1.5" />
    <text x="85" y="26" font-family="JetBrains Mono" font-size="14" fill="#3fb968" text-anchor="middle">No tracking</text>

    <rect x="186" y="0" width="170" height="40" rx="20" fill="#0e1a13" stroke="#1f3328" stroke-width="1.5" />
    <text x="271" y="26" font-family="JetBrains Mono" font-size="14" fill="#3fb968" text-anchor="middle">No accounts</text>

    <rect x="372" y="0" width="210" height="40" rx="20" fill="#0e1a13" stroke="#1f3328" stroke-width="1.5" />
    <text x="477" y="26" font-family="JetBrains Mono" font-size="14" fill="#3fb968" text-anchor="middle">No server storage</text>

    <rect x="598" y="0" width="160" height="40" rx="20" fill="#0e1a13" stroke="#1f3328" stroke-width="1.5" />
    <text x="678" y="26" font-family="JetBrains Mono" font-size="14" fill="#3fb968" text-anchor="middle">AGPL-3.0</text>
  </g>

  <!-- Bottom accent -->
  <rect x="0" y="618" width="1200" height="12" fill="#3fb968" opacity="0.5" />
</svg>
