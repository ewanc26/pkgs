<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/logo/Opal.svg" type="image/svg+xml" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#0a0f0d" />

		<!-- Primary -->
		<title>Opal</title>
		<meta name="description" content="Convert your microblog posts from Twitter, Mastodon, Threads, and Nostr to AT Protocol Bluesky posts. Free, open-source, runs in your browser." />
		<meta name="author" content="Ewan Croft" />
		<link rel="canonical" href="https://opal.croft.click" />

		<!-- Open Graph -->
		<meta property="og:site_name" content="Opal" />
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://opal.croft.click" />
		<meta property="og:title" content="Opal" />
		<meta property="og:description" content="Convert your microblog posts from Twitter, Mastodon, Threads, and Nostr to AT Protocol Bluesky posts. Free, open-source, runs in your browser." />
		<meta property="og:image" content="https://opal.croft.click/og.svg" />

		<!-- Twitter / X card -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="Opal" />
		<meta name="twitter:description" content="Convert your microblog posts from Twitter, Mastodon, Threads, and Nostr to AT Protocol Bluesky posts. Free, open-source, runs in your browser." />
		<meta name="twitter:image" content="https://opal.croft.click/og.svg" />

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
