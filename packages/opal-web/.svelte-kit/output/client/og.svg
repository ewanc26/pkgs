<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <radialGradient id="bgGlowOpal" cx="50%" cy="48%" r="42%">
      <stop offset="0%" stop-color="#1a003a" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#02000a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="opalPlay" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#cc66ff" />
      <stop offset="20%" stop-color="#33ccff" />
      <stop offset="40%" stop-color="#33ff99" />
      <stop offset="60%" stop-color="#ffff66" />
      <stop offset="80%" stop-color="#ffcc33" />
      <stop offset="100%" stop-color="#cc66ff" />
    </linearGradient>
    <clipPath id="innerClipOpal">
      <circle cx="250" cy="250" r="220" />
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1600" height="900" fill="#02000a"/>
  <rect width="1600" height="900" fill="url(#bgGlowOpal)"/>

  <!-- Logo centred (entire content replaced with the actual logo) -->
  <svg x="610" y="200" width="380" height="380" viewBox="0 0 500 500">
    <defs>
      <!-- Opalescent play-of-color gradient (re-defined locally within the nested SVG) -->
      <linearGradient id="opalPlay" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#cc66ff" /> <!-- Violet/magenta fire -->
        <stop offset="20%" stop-color="#33ccff" /> <!-- Cyan fire -->
        <stop offset="40%" stop-color="#33ff99" /> <!-- Green fire -->
        <stop offset="60%" stop-color="#ffff66" /> <!-- Yellow fire -->
        <stop offset="80%" stop-color="#ffcc33" /> <!-- Orange fire -->
        <stop offset="100%" stop-color="#cc66ff" /> <!-- Loop violet -->
      </linearGradient>

      <!-- Clip path to keep interior elements inside -->
      <clipPath id="innerClip">
        <circle cx="250" cy="250" r="220" />
      </clipPath>
    </defs>

    <!-- BACKGROUND: Dark potch (matrix) base -->
    <circle cx="250" cy="250" r="220" fill="#020008" />

    <!-- INTERIOR ELEMENTS (RILLS and PATTERNS) -->
    <g clip-path="url(#innerClip)">
      <!-- Eccentric Ripple Rills - Multiple sets with subtle color shifts -->

      <!-- Set 1: Center-Left origin -->
      <g stroke="none">
        <circle cx="130" cy="160" r="240.0" fill="none" stroke="#cc66ff" stroke-width="6.0" opacity="0.3" />
        <circle cx="130" cy="160" r="213.3" fill="none" stroke="#66ffff" stroke-width="6.0" opacity="0.2" />
        <circle cx="130" cy="160" r="186.7" fill="none" stroke="#33ff99" stroke-width="6.0" opacity="0.15" />
        <circle cx="130" cy="160" r="160.0" fill="none" stroke="#ffff66" stroke-width="6.0" opacity="0.1" />
      </g>

      <!-- Set 2: Bottom-Center origin -->
      <g stroke="none">
        <circle cx="250" cy="480" r="180.0" fill="none" stroke="#cc66ff" stroke-width="6.0" opacity="0.3" />
        <circle cx="250" cy="480" r="128.6" fill="none" stroke="#66ffff" stroke-width="6.0" opacity="0.2" />
        <circle cx="250" cy="480" r="77.1" fill="none" stroke="#33ff99" stroke-width="6.0" opacity="0.1" />
      </g>

      <!-- Set 3: Center-Right origin -->
      <g stroke="none">
        <circle cx="380" cy="320" r="260.0" fill="none" stroke="#cc66ff" stroke-width="6.0" opacity="0.3" />
        <circle cx="380" cy="320" r="212.7" fill="none" stroke="#66ffff" stroke-width="6.0" opacity="0.2" />
        <circle cx="380" cy="320" r="165.5" fill="none" stroke="#33ff99" stroke-width="6.0" opacity="0.15" />
      </g>
    </g>

    <!-- STAR STRUCTURE: Pure Opalescent Glow -->
    <path d="M 250 30 L 379.3 428 L 40.8 182 L 459.2 182 L 120.7 428 Z"
          fill="none"
          stroke="#ffffff"
          stroke-width="5"
          stroke-linejoin="round"
          opacity="0.9" />

    <!-- CENTRAL NODE: Intense Opal Fire -->
    <circle cx="250" cy="250" r="16" fill="#020008" stroke="url(#opalPlay)" stroke-width="4" />
    <circle cx="250" cy="250" r="8" fill="url(#opalPlay)" />

    <!-- OUTER RING and DASHED BORDER -->
    <circle cx="250" cy="250" r="220" fill="none" stroke="url(#opalPlay)" stroke-width="14" />
    <circle cx="250" cy="250" r="235" fill="none" stroke="url(#opalPlay)" stroke-width="3" stroke-dasharray="6, 8" />

    <!-- PERIMETER NODE POINTS with individual fire flashes -->
    <!-- Top Node (Purple Fire) -->
    <g>
      <circle cx="250" cy="30" r="10" fill="#020008" stroke="#ffffff" stroke-width="3" />
      <circle cx="250" cy="30" r="5" fill="#cc66ff" />
    </g>
    <!-- Bottom-Right Node (Cyan Fire) -->
    <g>
      <circle cx="379.3" cy="428" r="10" fill="#020008" stroke="#ffffff" stroke-width="3" />
      <circle cx="379.3" cy="428" r="5" fill="#33ccff" />
    </g>
    <!-- Mid-Left Node (Green Fire) -->
    <g>
      <circle cx="40.8" cy="182" r="10" fill="#020008" stroke="#ffffff" stroke-width="3" />
      <circle cx="40.8" cy="182" r="5" fill="#33ff99" />
    </g>
    <!-- Mid-Right Node (Yellow Fire) -->
    <g>
      <circle cx="459.2" cy="182" r="10" fill="#020008" stroke="#ffffff" stroke-width="3" />
      <circle cx="459.2" cy="182" r="5" fill="#ffff66" />
    </g>
    <!-- Bottom-Left Node (Orange Fire) -->
    <g>
      <circle cx="120.7" cy="428" r="10" fill="#020008" stroke="#ffffff" stroke-width="3" />
      <circle cx="120.7" cy="428" r="5" fill="#ffcc33" />
    </g>
  </svg>

  <!-- Name -->
  <text x="800" y="648" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
        font-size="72" font-weight="700" letter-spacing="6" fill="#ffffff">opal</text>

  <!-- Tagline -->
  <text x="800" y="706" text-anchor="middle" font-family="'SF Pro Text', 'Helvetica Neue', Arial, sans-serif"
        font-size="28" font-weight="400" letter-spacing="2" fill="#cc66ff">Cross-platform microblog → ATProto</text>

  <line x1="680" y1="722" x2="920" y2="722" stroke="#1a003a" stroke-width="1"/>
</svg>
