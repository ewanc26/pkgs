<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <clipPath id="circleClip">
      <circle cx="250" cy="250" r="220" />
    </clipPath>
  </defs>

  <circle cx="250" cy="250" r="220" fill="#1a1816" />

  <g clip-path="url(#circleClip)">
    <!-- Timeline spine -->
    <rect x="120" y="80" width="4" height="340" fill="#44403a" rx="2" />

    <!-- Entry markers -->
    <circle cx="122" cy="120" r="12" fill="#e2a93b" />
    <circle cx="122" cy="200" r="10" fill="#665e54" />
    <circle cx="122" cy="280" r="10" fill="#665e54" />
    <circle cx="122" cy="360" r="10" fill="#665e54" />

    <!-- Entry lines (content bars) -->
    <rect x="150" y="108" width="220" height="24" fill="#e2a93b" rx="4" opacity="0.9" />
    <rect x="150" y="188" width="180" height="24" fill="#38342b" rx="4" />
    <rect x="150" y="268" width="200" height="24" fill="#38342b" rx="4" />
    <rect x="150" y="348" width="160" height="24" fill="#38342b" rx="4" />

    <!-- Tag pills -->
    <rect x="150" y="140" width="50" height="14" fill="#e2a93b" rx="3" opacity="0.3" />
    <rect x="150" y="220" width="40" height="14" fill="#6b9fbf" rx="3" opacity="0.3" />
    <rect x="150" y="300" width="45" height="14" fill="#7dba8a" rx="3" opacity="0.3" />
  </g>

  <circle cx="250" cy="250" r="220" fill="none" stroke="#e2a93b" stroke-width="8" />
  <circle cx="250" cy="250" r="235" fill="none" stroke="#e2a93b" stroke-width="2" stroke-dasharray="6, 8" opacity="0.5" />
</svg>
