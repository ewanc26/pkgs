<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#1f3328" />
    </pattern>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="14" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <radialGradient id="glowGrad" cx="75%" cy="45%" r="38%">
      <stop offset="0%" stop-color="#3fb968" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#090f0c" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#090f0c" />
  <rect width="1200" height="630" fill="url(#dots)" />
  <rect width="1200" height="630" fill="url(#glowGrad)" />

  <!-- Left accent bar -->
  <rect x="72" y="160" width="3" height="310" rx="2" fill="#3fb968" opacity="0.7" />

  <!-- Eyebrow -->
  <text x="96" y="192" font-family="JetBrains Mono" font-size="18" fill="#6b9e7e" letter-spacing="3">MALACHITE / IMPORT</text>

  <!-- Headline -->
  <text x="96" y="280" font-family="Inter" font-size="76" font-weight="700" fill="#d8ede1" letter-spacing="-2">Import to Teal.</text>

  <!-- Subline -->
  <text x="96" y="334" font-family="Inter" font-size="26" fill="#6b9e7e">Choose a mode, sign in, upload your export.</text>
  <text x="96" y="366" font-family="Inter" font-size="26" fill="#6b9e7e">Everything runs in your browser.</text>

  <!-- Step indicator row -->
  <g transform="translate(96, 430)">
    <circle cx="20" cy="20" r="20" fill="#3fb968" />
    <text x="20" y="26" font-family="JetBrains Mono" font-size="16" font-weight="600" fill="#090f0c" text-anchor="middle">1</text>
    <line x1="40" y1="20" x2="100" y2="20" stroke="#1f3328" stroke-width="2" stroke-dasharray="4 4" />

    <circle cx="120" cy="20" r="20" fill="#0e1a13" stroke="#1f3328" stroke-width="2" />
    <text x="120" y="26" font-family="JetBrains Mono" font-size="16" fill="#6b9e7e" text-anchor="middle">2</text>
    <line x1="140" y1="20" x2="200" y2="20" stroke="#1f3328" stroke-width="2" stroke-dasharray="4 4" />

    <circle cx="220" cy="20" r="20" fill="#0e1a13" stroke="#1f3328" stroke-width="2" />
    <text x="220" y="26" font-family="JetBrains Mono" font-size="16" fill="#6b9e7e" text-anchor="middle">3</text>
    <line x1="240" y1="20" x2="300" y2="20" stroke="#1f3328" stroke-width="2" stroke-dasharray="4 4" />

    <circle cx="320" cy="20" r="20" fill="#0e1a13" stroke="#1f3328" stroke-width="2" />
    <text x="320" y="26" font-family="JetBrains Mono" font-size="16" fill="#6b9e7e" text-anchor="middle">4</text>
    <line x1="340" y1="20" x2="400" y2="20" stroke="#1f3328" stroke-width="2" stroke-dasharray="4 4" />

    <circle cx="420" cy="20" r="20" fill="#0e1a13" stroke="#1f3328" stroke-width="2" />
    <text x="420" y="26" font-family="JetBrains Mono" font-size="16" fill="#6b9e7e" text-anchor="middle">5</text>

    <text x="20" y="60" font-family="JetBrains Mono" font-size="12" fill="#3fb968" text-anchor="middle">MODE</text>
    <text x="120" y="60" font-family="JetBrains Mono" font-size="12" fill="#6b9e7e" text-anchor="middle">SIGN IN</text>
    <text x="220" y="60" font-family="JetBrains Mono" font-size="12" fill="#6b9e7e" text-anchor="middle">FILES</text>
    <text x="320" y="60" font-family="JetBrains Mono" font-size="12" fill="#6b9e7e" text-anchor="middle">OPTIONS</text>
    <text x="420" y="60" font-family="JetBrains Mono" font-size="12" fill="#6b9e7e" text-anchor="middle">RUN</text>
  </g>

  <!-- Right: mode cards -->
  <g transform="translate(780, 150)" filter="url(#glow)">
    <rect x="0" y="0" width="340" height="330" rx="14" fill="#0e1a13" stroke="#1f3328" stroke-width="1.5" />

    <rect x="20" y="20" width="300" height="68" rx="8" fill="#152019" stroke="#1f3328" stroke-width="1" />
    <text x="44" y="50" font-family="Inter" font-size="17" font-weight="600" fill="#d8ede1">Last.fm</text>
    <text x="44" y="72" font-family="Inter" font-size="13" fill="#6b9e7e">Import scrobble history from CSV</text>

    <rect x="20" y="104" width="300" height="68" rx="8" fill="#152019" stroke="#1f3328" stroke-width="1" />
    <text x="44" y="134" font-family="Inter" font-size="17" font-weight="600" fill="#d8ede1">Spotify</text>
    <text x="44" y="156" font-family="Inter" font-size="13" fill="#6b9e7e">Import play history from JSON</text>

    <rect x="20" y="188" width="300" height="68" rx="8" fill="#152019" stroke="#3fb968" stroke-width="1.5" />
    <text x="44" y="218" font-family="Inter" font-size="17" font-weight="600" fill="#3fb968">Combined</text>
    <text x="44" y="240" font-family="Inter" font-size="13" fill="#6b9e7e">Merge both with deduplication</text>

    <text x="170" y="314" font-family="JetBrains Mono" font-size="13" fill="#2d8a4e" text-anchor="middle">+ sync · deduplicate</text>
  </g>

  <!-- Bottom accent -->
  <rect x="0" y="618" width="1200" height="12" fill="#3fb968" opacity="0.5" />
</svg>
